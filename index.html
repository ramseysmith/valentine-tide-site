<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Valentine Tide — Surf the Shadows</title>
  <meta name="description" content="Valentine Tide. Goth and punk surf apparel. Drop 001 lands soon. Surf the shadows." />

  <!-- Favicon (using the dark avatar mark; swap for a dedicated favicon anytime) -->
  <link rel="icon" href="assets/avatar.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/avatar.png" />

  <!--
    Open Graph block for link previews.
    Replace the image path and url once assets/domain are final.
  -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Valentine Tide — Surf the Shadows" />
  <meta property="og:description" content="Goth and punk surf apparel. Drop 001 lands soon." />
  <meta property="og:image" content="assets/og-image.png" />
  <meta property="og:url" content="https://valentinetide.com" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Fonts: Pirata One (display) + Inter (body) from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <!-- ============================================================
         HERO
         Wordmark renders from the transparent PNG. If the image is
         missing/fails, the onerror handler reveals the styled
         Pirata One text fallback (see .wordmark--fallback in CSS).
         ============================================================ -->
    <header class="hero" id="top">
      <div class="hero__inner">
        <h1 class="wordmark">
          <img
            class="wordmark__img"
            src="assets/wordmark.png"
            alt="Valentine Tide"
            width="2097"
            height="331"
            onerror="this.closest('.wordmark').classList.add('wordmark--fallback')"
          />
          <!-- Styled fallback (hidden unless the image fails) -->
          <span class="wordmark__text" aria-hidden="true">
            <span class="wordmark__valentine">Valentine</span>
            <span class="wordmark__tide">Tide</span>
          </span>
        </h1>

        <p class="hero__tagline">Surf the Shadows</p>
        <p class="hero__drop">Drop 001 lands soon.</p>
      </div>
    </header>

    <!-- ============================================================
         EMAIL CAPTURE
         Validation + submit handled in script.js. While FORM_ENDPOINT
         is left as its placeholder, submits are simulated so the
         success state can be previewed without a backend.
         ============================================================ -->
    <section class="signup" id="signup" aria-labelledby="signup-heading">
      <div class="signup__inner">
        <h2 class="signup__heading" id="signup-heading">Join the cult</h2>
        <p class="signup__sub">
          First access to Drop 001. No noise — only the tide.
        </p>

        <form class="signup__form" id="signup-form" novalidate>
          <label class="visually-hidden" for="email">Email address</label>
          <div class="field">
            <input
              class="field__input"
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              inputmode="email"
              required
              aria-describedby="form-status"
            />
            <button class="btn" type="submit">Join the cult</button>
          </div>

          <!-- Live region: validation + result messages announce here -->
          <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
